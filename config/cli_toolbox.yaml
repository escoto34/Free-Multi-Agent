# Terminal toolbox catalog for MultiAgent (/tools, multiagent tools, toolbox_query).
# id: stable key · bin: PATH binary (or first of bins) · category · tags · replaces · install hints
version: 1

profiles:
  core:
    description: Modern shell essentials (high ROI for almost every dev)
    tools:
      - eza
      - bat
      - ripgrep
      - fd
      - fzf
      - zoxide
      - starship
      - atuin
      - git-delta
      - mise
      - jq
      - rip2
      - tldr
  git:
    description: Git UX, forges, and secret hygiene
    tools:
      - lazygit
      - git-delta
      - gh
      - glab
      - difftastic
      - gitleaks
      - git-absorb
  docker:
    description: Containers and image hygiene
    tools:
      - lazydocker
      - dive
      - trivy
      - ctop
  k8s:
    description: Kubernetes day-to-day
    tools:
      - k9s
      - kdash
      - stern
      - kubectx
      - helm
  disk:
    description: Disk space and cleanup
    tools:
      - dust
      - dua-cli
      - duf
      - fdupes
  net:
    description: Network diagnostics and HTTP
    tools:
      - httpie
      - dog
      - bandwhich
      - gping
      - trippy
  monitor:
    description: System / process monitors
    tools:
      - btop
      - bottom
      - procs
      - glances
  data:
    description: Structured data on the CLI
    tools:
      - jq
      - yq
      - miller
      - jless
      - dasel
  security:
    description: Secrets, scanners, script quality
    tools:
      - age
      - sops
      - gitleaks
      - shellcheck
      - trivy
  ai:
    description: LLM / agent CLIs (pairs with MultiAgent)
    tools:
      - llm
      - ollama
      - mods
      - aichat
      - aider
  modern-rust:
    description: 2025–2026 Rust-ish stack
    tools:
      - atuin
      - starship
      - zellij
      - yazi
      - fd
      - dust
      - bottom
      - mise
      - git-delta
      - ripgrep
      - eza
      - bat

tools:
  # ── Utilidades generales ──────────────────────────────────────────
  - id: eza
    name: eza
    bin: eza
    category: general
    tags: [ls, files, tree, git, listing]
    replaces: [ls]
