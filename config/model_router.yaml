providers:
  groq:
    base_url: https://api.groq.com/openai/v1
    env_key: GROQ_API_KEY
    signup: https://console.groq.com/keys
    notes: Free ~1000 RPD/model (gpt-oss family). compound-mini ~250 RPD + Tavily
      web search — reserve for deep_research.web_search only.
    daily_limit_per_model: 800
    models:
    - openai/gpt-oss-120b
    - openai/gpt-oss-20b
    - openai/gpt-oss-safeguard-20b
    - qwen/qwen3.6-27b
    - groq/compound-mini
  openrouter:
    base_url: https://openrouter.ai/api/v1
    env_key: OPENROUTER_API_KEY
    signup: https://openrouter.ai/keys
    notes: ~50 RPD free models shared (20 RPM); ~1000 RPD after $10 lifetime credits.
      Prefer :free model ids. Not on free-durable hot path — catalog for optional
      use.
    daily_limit_shared: 45
    models:
    - cohere/north-mini-code:free
    - tencent/hy3:free
    - google/gemma-3-27b-it:free
    - meta-llama/llama-3.3-70b-instruct:free
    - qwen/qwen3-32b:free
  cohere:
    env_key: COHERE_API_KEY
    signup: https://dashboard.cohere.com/api-keys
    notes: 'Trial ~1000 calls/month (~25-30/day). Non-commercial on trial — check
      ToS. Free-durable: only deep_research.grounding uses Cohere as primary.'
    daily_limit: 28
    models:
    - command-a-plus-05-2026
    - command-r-plus-08-2024
    - command-r7b-12-2024
  mistral:
    base_url: https://api.mistral.ai/v1
    env_key: MISTRAL_API_KEY
    signup: https://console.mistral.ai
    notes: 'Studio Free / Experiment: no card, rate-limited. codestral + small/medium/devstral.'
    daily_limit: 200
    models:
    - mistral-small-latest
    - mistral-medium-latest
    - codestral-latest
    - open-mistral-nemo
    - devstral-latest
    - ministral-8b-latest
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    env_key: GEMINI_API_KEY
    signup: https://aistudio.google.com/apikey
    notes: Google AI Studio free. Flash models have higher free RPM; Pro is tighter.
    daily_limit: 400
    models:
    - gemini-2.5-flash
    - gemini-2.0-flash
    - gemini-2.5-flash-lite
    - gemma-3-27b-it
  cerebras:
    base_url: https://api.cerebras.ai/v1
    env_key: CEREBRAS_API_KEY
    signup: https://cloud.cerebras.ai
    notes: 'Catalog changes often. Free/dev ~5 RPM, ~1M TPD. Common IDs: gemma-4-31b,
      gpt-oss-120b, zai-glm-4.7 (Llama IDs may 404). Quality burst fallback, not hot
      path.'
    daily_limit: 150
    models:
    - gemma-4-31b
    - gpt-oss-120b
    - zai-glm-4.7
  ollama:
    base_url: http://localhost:11434/v1
    env_key: OLLAMA_API_KEY
    signup: https://ollama.com/download
    notes: 'Local OpenAI-compatible server. No API key required. Model list is ONLY
      what `ollama list` reports (daemon /api/tags) — not a static catalog. Override
      host: OLLAMA_BASE_URL or OLLAMA_HOST. Pull: ollama pull <name>.'
    daily_limit: 100000
    models: []
  agnes:
    base_url: https://apihub.agnes-ai.com/v1
    env_key: AGNES_API_KEY
    signup: https://platform.agnes-ai.com
    notes: 'Agnes AI free multimodal OpenAI-compatible gateway (no card). Chat/pipelines
      text model: agnes-2.0-flash (~20 RPM free fair-use, $0/M tokens, large context,
      tool-calling, coding, agents — Claw-Eval strong). Also free (other endpoints,
      not chat roles): agnes-image-2.0-flash, agnes-image-2.1-flash (/v1/images/generations),
      agnes-video-v2.0 (/v1/videos). Key: platform.agnes-ai.com'
    daily_limit: 2000
    models:
    - agnes-2.0-flash
deprecated:
- llama-3.1-8b-instant
- llama-3.3-70b-versatile
- qwen/qwen3-32b
- llama-4-scout-17b-16e-instruct
vibe_coding:
  architect:
    provider: agnes
    model: agnes-2.0-flash
    fallback:
      provider: gemini
      model: gemini-2.0-flash
  coder:
    provider: mistral
    model: codestral-latest
    fallback:
      provider: agnes
      model: agnes-2.0-flash
  debugger:
    provider: groq
    model: openai/gpt-oss-120b
    fallback:
      provider: agnes
      model: agnes-2.0-flash
  max_fix_cycles: 3
deep_research:
  safety_filter:
    provider: groq
    model: openai/gpt-oss-safeguard-20b
    fallback:
      provider: gemini
      model: gemini-2.0-flash
  context_compressor:
    provider: agnes
    model: agnes-2.0-flash
    fallback:
      provider: gemini
      model: gemini-2.0-flash
  web_search:
    provider: groq
    model: groq/compound-mini
  grounding:
    provider: cohere
    model: command-a-plus-05-2026
    fallback:
      provider: mistral
      model: mistral-small-latest
  synthesizer:
    provider: groq
    model: openai/gpt-oss-120b
    fallback:
      provider: agnes
      model: agnes-2.0-flash
fallback_cascade:
  cohere_fallback:
    provider: mistral
    model: mistral-small-latest
  openrouter_fallback:
    provider: agnes
    model: agnes-2.0-flash
  groq_fallback:
    provider: gemini
    model: gemini-2.0-flash
  mistral_fallback:
    provider: agnes
    model: agnes-2.0-flash
  gemini_fallback:
    provider: cerebras
    model: gemma-4-31b
  cerebras_fallback:
    provider: groq
    model: openai/gpt-oss-120b
  agnes_fallback:
    provider: groq
    model: openai/gpt-oss-120b
cli:
  chat:
    provider: agnes
    model: agnes-2.0-flash
    fallback:
      provider: groq
      model: openai/gpt-oss-120b
  planner:
    provider: openrouter
    model: tencent/hy3:free
    fallback:
      provider: groq
      model: openai/gpt-oss-120b
  context_limit_tokens: 16000
  compact_keep_recent_messages: 4
  compact_target_ratio: 0.45
  use_graphify: true
  graphify_budget: 1200
  chat_recent_messages: 4
  store_reply_max_chars: 1200
